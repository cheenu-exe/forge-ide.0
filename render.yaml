services:
  - type: web
    name: forge-ide-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BACKEND_PORT
        value: $PORT
      - key: EXECUTION_ENGINE
        value: local
      - key: EXECUTION_TIMEOUT_SECONDS
        value: "30"
      - key: EXECUTION_MAX_TIMEOUT_SECONDS
        value: "60"
