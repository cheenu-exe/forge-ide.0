services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      COMPILER_BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "4028:4028"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      BACKEND_ALLOWED_ORIGINS: http://localhost:4028
      EXECUTION_ENGINE: docker
      BACKEND_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
